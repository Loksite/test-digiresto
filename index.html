<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loksite — Connexion</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07080a;
  --s1:#0d0f12;
  --s2:#141618;
  --border:#1f2226;
  --border2:#252a2f;
  --text:#f2f0ec;
  --text2:#8a8782;
  --text3:#4a4846;
  --gold:#c8a96e;
  --gold2:#d4b87a;
  --green:#3a9668;
  --red:#c05050;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Outfit',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
}
body::before{
  content:'';
  position:fixed;inset:0;
  background:
    radial-gradient(ellipse at 70% 20%,rgba(200,169,110,.05) 0%,transparent 60%),
    radial-gradient(ellipse at 20% 80%,rgba(58,150,104,.04) 0%,transparent 60%);
  pointer-events:none;
}
.wrap{width:100%;max-width:420px;position:relative;z-index:1}

/* Logo */
.logo{display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:32px}
.logo-mark{
  width:40px;height:40px;border-radius:10px;
  background:var(--gold);
  display:flex;align-items:center;justify-content:center;
  font-family:'Playfair Display',serif;
  font-style:italic;font-size:22px;color:#07080a;font-weight:400;
}
.logo-name{
  font-family:'Playfair Display',serif;
  font-size:24px;font-weight:400;
  color:var(--text);letter-spacing:0.02em;
}
.logo-name span{color:var(--gold);font-style:italic}

/* Card */
.card{
  background:var(--s1);
  border:1px solid var(--border);
  border-radius:18px;
  padding:36px;
  box-shadow:0 8px 48px rgba(0,0,0,0.5);
}
.card-title{
  font-family:'Playfair Display',serif;
  font-size:22px;font-weight:400;
  margin-bottom:6px;color:var(--text);
}
.card-sub{font-size:13px;color:var(--text2);margin-bottom:28px;line-height:1.6}

/* Fields */
.field{margin-bottom:14px}
.field label{
  display:block;font-size:10px;font-weight:600;
  letter-spacing:.1em;text-transform:uppercase;
  color:var(--text3);margin-bottom:6px;
  font-family:'Outfit',sans-serif;
}
.field input{
  width:100%;
  background:var(--s2);
  border:1px solid var(--border2);
  border-radius:9px;
  padding:11px 14px;
  font-size:13px;color:var(--text);
  font-family:'Outfit',sans-serif;
  outline:none;transition:border .2s,box-shadow .2s;
}
.field input:focus{
  border-color:var(--gold);
  box-shadow:0 0 0 3px rgba(200,169,110,.08);
}
.field input::placeholder{color:var(--text3)}

/* Submit */
.submit{
  width:100%;padding:13px;
  background:var(--gold);border:none;border-radius:10px;
  font-size:14px;font-weight:600;color:#07080a;
  cursor:pointer;font-family:'Outfit',sans-serif;
  transition:all .2s;margin-top:4px;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.submit:hover{background:var(--gold2);transform:translateY(-1px)}
.submit:disabled{opacity:.5;cursor:not-allowed;transform:none}

/* Spinner */
.spinner{
  width:15px;height:15px;
  border:2px solid rgba(7,8,10,0.3);
  border-top-color:#07080a;
  border-radius:50%;
  animation:spin .7s linear infinite;
  display:none;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* Messages */
.error-box{
  background:rgba(192,80,80,.1);
  border:1px solid rgba(192,80,80,.25);
  border-radius:9px;padding:10px 14px;
  font-size:13px;color:var(--red);
  margin-top:14px;display:none;
  align-items:center;gap:8px;
}
.error-box.show{display:flex}
.success-box{
  background:rgba(58,150,104,.1);
  border:1px solid rgba(58,150,104,.25);
  border-radius:9px;padding:10px 14px;
  font-size:13px;color:var(--green);
  margin-top:14px;display:none;
  align-items:center;gap:8px;
}
.success-box.show{display:flex}

/* Footer */
.footer-note{
  text-align:center;margin-top:20px;
  font-size:12px;color:var(--text3);
  line-height:1.6;
}
.footer-note a{color:var(--gold);text-decoration:none}

/* Loading overlay */
.loading-overlay{
  position:fixed;inset:0;
  background:var(--bg);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:12px;z-index:999;
  transition:opacity .3s;
}
.loading-overlay.hide{opacity:0;pointer-events:none}
.loading-overlay .spinner{
  display:block;
  width:24px;height:24px;
  border-color:var(--border2);
  border-top-color:var(--gold);
}
.loading-overlay p{font-size:13px;color:var(--text2)}
</style>
</head>
<body>

<!-- Loading pendant la vérification de session -->
<div class="loading-overlay" id="loading-overlay">
  <div class="spinner"></div>
  <p>Chargement…</p>
</div>

<div class="wrap" style="display:none" id="login-wrap">
  <div class="logo">
    <div class="logo-mark">L</div>
    <div class="logo-name">Lok<span>site</span></div>
  </div>

  <div class="card">
    <div class="card-title">Bienvenue</div>
    <div class="card-sub">Connectez-vous à votre espace Loksite</div>

    <div class="field">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="votre@email.fr" autocomplete="email">
    </div>
    <div class="field">
      <label>Mot de passe</label>
      <input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password">
    </div>

    <button class="submit" id="login-btn" onclick="doLogin()">
      <span id="btn-label">Se connecter →</span>
      <div class="spinner" id="btn-spinner"></div>
    </button>

    <div class="error-box" id="error-box">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:15px;height:15px;flex-shrink:0"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span id="error-msg"></span>
    </div>
    <div class="success-box" id="success-box">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:15px;height:15px;flex-shrink:0"><polyline points="20 6 9 17 4 12"/></svg>
      <span id="success-msg"></span>
    </div>
  </div>

  <div class="footer-note">
    Loksite — Solutions digitales pour restaurants<br>
    <a href="mailto:contact@loksite.fr">contact@loksite.fr</a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://qhnofvfgutsdgbfwhupg.supabase.co';
const SUPABASE_KEY = 'sb_publishable_fJ-oHwhpaB0pBRwMgdwFXQ_GY2Ad9GY';
const ADMIN_URL    = 'https://papaya-hamster-6768e0.netlify.app/loksite-admin.html';
const CLIENT_URL   = 'espace.html';

const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

/* ── Helpers ── */
function showError(msg) {
  document.getElementById('error-msg').textContent = msg;
  document.getElementById('error-box').classList.add('show');
  document.getElementById('success-box').classList.remove('show');
}
function showSuccess(msg) {
  document.getElementById('success-msg').textContent = msg;
  document.getElementById('success-box').classList.add('show');
  document.getElementById('error-box').classList.remove('show');
}
function setLoading(on) {
  const btn    = document.getElementById('login-btn');
  const label  = document.getElementById('btn-label');
  const spinner = document.getElementById('btn-spinner');
  btn.disabled      = on;
  label.textContent = on ? 'Connexion…' : 'Se connecter →';
  spinner.style.display = on ? 'block' : 'none';
}

/* ── Routing après auth ── */
async function routeUser(userId) {
  try {
    const { data: profile } = await sb
      .from('profiles')
      .select('role, espace_url')
      .eq('id', userId)
      .single();

    const role = profile?.role || 'client';

    if (role === 'admin') {
      window.location.href = ADMIN_URL;
    } else {
      // Utilise espace_url depuis Supabase, sinon fallback sur CLIENT_URL
      window.location.href = profile?.espace_url || CLIENT_URL;
    }
  } catch(e) {
    // En cas d'erreur Supabase, on envoie vers l'espace client par défaut
    window.location.href = CLIENT_URL;
  }
}

/* ── Login ── */
async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pass  = document.getElementById('login-pass').value;

  if (!email || !pass) { showError('Veuillez remplir tous les champs.'); return; }

  setLoading(true);
  document.getElementById('error-box').classList.remove('show');

  const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });

  if (error) {
    showError('Email ou mot de passe incorrect.');
    setLoading(false);
    return;
  }

  showSuccess('Connexion réussie, redirection…');
  await routeUser(data.user.id);
}

/* ── Enter key ── */
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

/* ── Auto-redirect si déjà connecté ── */
window.addEventListener('load', async () => {
  // Si chargé dans une iframe (ex: aperçu dashboard SaaS), ne pas rediriger
  if (window.self !== window.top) {
    document.getElementById('loading-overlay').classList.add('hide');
    return;
  }
  const { data: { session } } = await sb.auth.getSession();
  if (session) {
    await routeUser(session.user.id);
  } else {
    document.getElementById('loading-overlay').classList.add('hide');
    document.getElementById('login-wrap').style.display = 'block';
  }
});
</script>
</body>
</html>
