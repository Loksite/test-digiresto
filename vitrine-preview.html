<!DOCTYPE html>
<html lang="fr"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Itsy Bitsy — Cuisine Végétale · Lille</title>
<meta name="description" content="Restaurant et traiteur 100% végétalien au cœur de Lille. Cuisine végétale créative, brunch du dimanche sur réservation. 10 rue Jeanne Maillotte, Lille.">
<meta property="og:title" content="Itsy Bitsy — Cuisine Végétale · Lille">
<meta property="og:description" content="Restaurant et traiteur 100% végétalien à Lille. Cuisine de saison, brunch dominical, produits frais et locaux.">
<meta property="og:type" content="restaurant">
<link rel="icon" href="data:image/svg+xml,&lt;svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'&gt;&lt;text y='.9em' font-size='90'&gt;🌿&lt;/text&gt;&lt;/svg&gt;">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&amp;family=Jost:wght@300;400;500;600&amp;family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400;1,600&amp;display=swap" rel="stylesheet">
<style>
:root {
  --c-forest:#1c3428;--c-pine:#2a5240;--c-sage:#4e8060;--c-fern:#7aab82;
  --c-mist:#b8d9bc;--c-cream:#f6f1e8;--c-linen:#ede5d4;--c-warm:#e8dfc9;
  --c-clay:#c4714a;--c-blush:#e0a07a;--c-gold:#c9a55a;
  --c-ink:#18261e;--c-slate:#3d5446;--c-smoke:#7a9480;--c-white:#ffffff;
  --nav-h:68px;--ease:cubic-bezier(0.4,0,0.2,1);--ease-out:cubic-bezier(0,0,0.2,1);
  --r-card:18px;--r-pill:100px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;font-size:16px;-webkit-text-size-adjust:100%}
body{font-family:'Jost',sans-serif;color:var(--c-ink);background:var(--c-cream);overflow-x:hidden;line-height:1.6}
img{display:block;max-width:100%}
a{text-decoration:none}
button{font-family:inherit;cursor:pointer}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--c-warm)}
::-webkit-scrollbar-thumb{background:var(--c-sage);border-radius:3px}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}

@keyframes fadeUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slowZoom{from{transform:scale(1.06)}to{transform:scale(1)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes scrollAnim{0%{transform:scaleY(0);transform-origin:top}50%{transform:scaleY(1);transform-origin:top}51%{transform:scaleY(1);transform-origin:bottom}100%{transform:scaleY(0);transform-origin:bottom}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}

.reveal{opacity:0;transform:translateY(20px);transition:opacity .6s ease-out,transform .6s ease-out}
.reveal.visible{opacity:1!important;transform:translateY(0)!important}
.d1{transition-delay:.1s}.d2{transition-delay:.2s}.d3{transition-delay:.3s}.d4{transition-delay:.4s}

/* NAV */
#nav{position:fixed;inset:0 0 auto;height:var(--nav-h);z-index:900;display:flex;align-items:center;justify-content:space-between;padding:0 5%;transition:background .45s var(--ease),box-shadow .45s}
#nav.scrolled{background:rgba(246,241,232,.96);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);box-shadow:0 1px 0 rgba(28,52,40,.08)}
.nav-logo{display:flex;align-items:center;gap:12px}
.logo-mark{width:46px;height:46px;background:var(--c-pine);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-style:italic;font-size:10px;color:var(--c-cream);text-align:center;line-height:1.2;padding:6px;transition:transform .4s var(--ease);flex-shrink:0}
#nav:not(.scrolled) .logo-mark{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.35)}
.nav-logo:hover .logo-mark{transform:rotate(-8deg) scale(1.07)}
.logo-name{font-family:'Playfair Display',serif;font-weight:700;font-size:1.15rem;color:var(--c-white);transition:color .35s}
#nav.scrolled .logo-name{color:var(--c-forest)}
.nav-links{display:flex;align-items:center;gap:1.8rem;list-style:none}
.nav-links a{font-size:.8rem;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.82);transition:color .3s,opacity .3s}
#nav.scrolled .nav-links a{color:var(--c-slate)}
.nav-links a:hover{color:var(--c-white)!important;opacity:1}
#nav.scrolled .nav-links a:hover{color:var(--c-sage)!important}
.nav-cta{background:var(--c-clay)!important;color:var(--c-white)!important;padding:.5rem 1.25rem;border-radius:var(--r-pill);font-weight:600!important;letter-spacing:.05em!important;transition:background .3s,transform .2s,box-shadow .3s!important;opacity:1!important}
.nav-cta:hover{background:var(--c-blush)!important;transform:translateY(-2px);box-shadow:0 6px 20px rgba(196,113,74,.35)!important}
.hamburger{display:none;flex-direction:column;gap:5px;background:none;border:none;padding:4px}
.hamburger span{display:block;width:22px;height:2px;background:var(--c-white);border-radius:2px;transition:all .3s}
#nav.scrolled .hamburger span{background:var(--c-forest)}
.hamburger.open span:nth-child(1){transform:rotate(45deg) translate(5px,5px)}
.hamburger.open span:nth-child(2){opacity:0;width:0}
.hamburger.open span:nth-child(3){transform:rotate(-45deg) translate(5px,-5px)}
.mobile-nav{display:none;position:fixed;top:var(--nav-h);inset-inline:0;background:var(--c-cream);z-index:899;padding:2rem 5% 2.5rem;flex-direction:column;gap:0;box-shadow:0 12px 40px rgba(28,52,40,.12)}
.mobile-nav.open{display:flex}
.mobile-nav a{padding:1rem 0;font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1.35rem;color:var(--c-forest);border-bottom:1px solid var(--c-warm);transition:color .25s,padding-left .25s}
.mobile-nav a:hover{color:var(--c-sage);padding-left:8px}
.mob-cta{margin-top:1.5rem;background:var(--c-clay);color:var(--c-white)!important;text-align:center;border-radius:var(--r-pill);padding:.9rem!important;font-family:'Jost',sans-serif!important;font-style:normal!important;font-size:.9rem!important;border-bottom:none!important}

/* HERO */
#hero{position:relative;height:100vh;min-height:620px;display:flex;align-items:center;justify-content:center;overflow:hidden;background:var(--c-forest)}
.hero-bg{position:absolute;inset:0;overflow:hidden}

.hero-overlay{position:absolute;inset:0;background:linear-gradient(170deg,rgba(28,52,40,.85) 0%,rgba(42,82,64,.7) 50%,rgba(28,52,40,.75) 100%)}
.hero-blob{position:absolute;bottom:-5%;right:-8%;width:45vw;height:45vw;max-width:600px;max-height:600px;background:radial-gradient(ellipse,rgba(122,171,130,.18) 0%,transparent 70%);border-radius:60% 40% 55% 45%/50% 60% 40% 50%;pointer-events:none}
.hero-content{position:relative;z-index:2;text-align:center;color:var(--c-white);padding:0 1.5rem;max-width:820px}
.hero-eyebrow{display:inline-flex;align-items:center;gap:12px;font-size:.72rem;letter-spacing:.28em;text-transform:uppercase;color:var(--c-mist);margin-bottom:1.6rem;opacity:0;animation:fadeUp .7s .4s var(--ease) forwards}
.hero-eyebrow::before,.hero-eyebrow::after{content:'';display:block;width:32px;height:1px;background:rgba(184,217,188,.5)}
.hero-title{font-family:'Playfair Display',serif;font-size:clamp(3.8rem,10vw,7.5rem);font-weight:700;line-height:.95;margin-bottom:.4rem;opacity:0;animation:fadeUp .85s .55s var(--ease) forwards;letter-spacing:-.02em}
.hero-title em{font-style:italic;color:var(--c-mist);display:block;font-size:clamp(1.2rem,3vw,1.9rem);letter-spacing:.06em;margin-top:.5rem}
.hero-tagline{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:clamp(1.05rem,2vw,1.4rem);color:rgba(255,255,255,.8);margin:1.8rem auto 2.6rem;max-width:520px;line-height:1.7;opacity:0;animation:fadeUp .8s .75s var(--ease) forwards}
.hero-btns{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;opacity:0;animation:fadeUp .8s .95s var(--ease) forwards}
.btn-primary{background:var(--c-clay);color:var(--c-white);padding:.9rem 2.2rem;border-radius:var(--r-pill);font-weight:600;font-size:.9rem;letter-spacing:.04em;transition:background .3s,transform .25s,box-shadow .3s;border:2px solid transparent}
.btn-primary:hover{background:var(--c-blush);transform:translateY(-3px);box-shadow:0 12px 30px rgba(196,113,74,.4)}
.btn-ghost{background:transparent;color:var(--c-white);padding:.9rem 2.2rem;border-radius:var(--r-pill);font-weight:500;font-size:.9rem;letter-spacing:.04em;border:1.5px solid rgba(255,255,255,.45);transition:border-color .3s,background .3s,transform .25s}
.btn-ghost:hover{border-color:var(--c-white);background:rgba(255,255,255,.1);transform:translateY(-3px)}
.hero-badge{position:absolute;bottom:2.8rem;right:5%;background:rgba(255,255,255,.1);backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,.22);border-radius:16px;padding:1rem 1.4rem;text-align:center;color:var(--c-white);animation:fadeIn .8s 1.3s var(--ease) forwards;opacity:0}
.badge-stars{font-size:.85rem;letter-spacing:3px;color:var(--c-gold)}
.badge-score{font-family:'Playfair Display',serif;font-size:1.6rem;font-weight:700;line-height:1.1}
.badge-label{font-size:.7rem;opacity:.7;letter-spacing:.08em}
.hero-scroll{position:absolute;bottom:2.5rem;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:8px;color:rgba(255,255,255,.5);font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;animation:fadeIn 1s 1.8s ease forwards;opacity:0}
.scroll-line{width:1px;height:44px;background:linear-gradient(to bottom,rgba(255,255,255,.5),transparent);animation:scrollAnim 2s 2s ease infinite}

/* SECTIONS */
.sw{max-width:1240px;margin:0 auto}
.section-label{display:inline-block;font-size:.7rem;letter-spacing:.28em;text-transform:uppercase;font-weight:600;color:var(--c-clay);margin-bottom:.7rem}
.section-title{font-family:'Playfair Display',serif;font-size:clamp(2rem,4.5vw,3.2rem);font-weight:700;color:var(--c-forest);line-height:1.12;margin-bottom:1rem}
.section-title em{font-style:italic;color:var(--c-sage)}
.section-lead{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1.15rem;color:var(--c-smoke);line-height:1.8}

/* PRESENTATION */
#presentation{background:var(--c-white);padding:8rem 5%}
.pres-grid{display:grid;grid-template-columns:1fr 1fr;gap:6rem;align-items:center}
.pres-text p{font-family:'Cormorant Garamond',serif;font-size:1.1rem;color:var(--c-slate);line-height:1.9;margin-top:1rem}
.pres-badges{display:flex;flex-wrap:wrap;gap:.8rem;margin-top:2rem}
.badge-pill{display:inline-flex;align-items:center;gap:6px;background:var(--c-cream);border:1px solid var(--c-mist);color:var(--c-pine);padding:.45rem 1rem;border-radius:var(--r-pill);font-size:.82rem;font-weight:500;transition:border-color .3s,background .3s}
.badge-pill:hover{border-color:var(--c-sage);background:#eaf3ec}
.pres-img-wrap{position:relative}
.pres-img-frame{position:absolute;top:-18px;right:-18px;bottom:18px;left:18px;border:2px solid var(--c-mist);border-radius:22px;z-index:0;pointer-events:none}
.pres-img{position:relative;z-index:1;width:100%;aspect-ratio:4/5;object-fit:cover;border-radius:20px;transition:transform .6s var(--ease)}
.pres-img-wrap:hover .pres-img{transform:scale(1.02) translateY(-4px)}
.pres-stat{position:absolute;left:-28px;bottom:40px;z-index:2;background:var(--c-forest);color:var(--c-white);padding:1.2rem 1.5rem;border-radius:16px;box-shadow:0 20px 50px rgba(28,52,40,.3);animation:float 4s ease-in-out infinite}
.pres-stat-num{font-family:'Playfair Display',serif;font-size:2rem;font-weight:700;color:var(--c-gold);line-height:1}
.pres-stat-label{font-size:.75rem;color:rgba(255,255,255,.7);margin-top:2px;letter-spacing:.06em}

/* MENU */
#menu{background:var(--c-cream);padding:8rem 5%}
.menu-header{text-align:center;max-width:620px;margin:0 auto 3rem}
.brunch-card{max-width:1240px;margin:0 auto 3.5rem;background:linear-gradient(135deg,var(--c-forest) 0%,var(--c-pine) 100%);border-radius:24px;padding:2.8rem 3rem;display:grid;grid-template-columns:auto 1fr;gap:3rem;align-items:center;position:relative;overflow:hidden}
.brunch-card::before{content:'';position:absolute;right:-40px;top:-60px;width:280px;height:280px;border-radius:50%;background:radial-gradient(circle,rgba(122,171,130,.2),transparent 70%);pointer-events:none}
.brunch-price-block{text-align:center}
.brunch-price-label{font-size:.72rem;letter-spacing:.2em;text-transform:uppercase;color:var(--c-mist);margin-bottom:.4rem}
.brunch-price{font-family:'Playfair Display',serif;font-size:3.2rem;font-weight:700;color:var(--c-gold);line-height:1}
.brunch-price-sub{font-size:.78rem;color:rgba(255,255,255,.5);margin-top:3px}
.brunch-divider{width:1px;background:rgba(255,255,255,.15);align-self:stretch}
.brunch-info h3{font-family:'Playfair Display',serif;font-style:italic;font-size:1.5rem;color:var(--c-white);margin-bottom:.8rem}
.brunch-items{list-style:none;display:flex;flex-wrap:wrap;gap:.5rem 1.4rem}
.brunch-items li{color:rgba(255,255,255,.78);font-size:.88rem;display:flex;align-items:center;gap:6px}
.brunch-items li::before{content:'🌿';font-size:.7rem}
.brunch-note{margin-top:1.2rem;font-size:.78rem;color:var(--c-mist);display:flex;align-items:center;gap:8px}
.menu-tabs{display:flex;justify-content:center;flex-wrap:wrap;gap:.5rem;margin-bottom:2.5rem}
.tab-btn{background:none;border:1.5px solid var(--c-mist);color:var(--c-slate);padding:.55rem 1.4rem;border-radius:var(--r-pill);font-size:.84rem;font-weight:500;letter-spacing:.04em;transition:all .3s}
.tab-btn:hover{border-color:var(--c-sage);color:var(--c-pine)}
.tab-btn.active{background:var(--c-forest);border-color:var(--c-forest);color:var(--c-white)}
.tab-panel{display:none}
.tab-panel.active{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1.2rem;max-width:1240px;margin:0 auto}
.menu-card{background:var(--c-white);border-radius:var(--r-card);border:1px solid transparent;transition:border-color .3s,box-shadow .3s,transform .3s;overflow:hidden}
.menu-card:hover{border-color:var(--c-mist);transform:translateY(-4px);box-shadow:0 14px 40px rgba(28,52,40,.08)}
.menu-card-img{width:100%;height:160px;object-fit:cover;display:block}
.menu-card-body{padding:1.4rem 1.6rem;display:flex;justify-content:space-between;align-items:flex-start;gap:1rem}
.menu-card-info{flex:1}
.menu-card-name{font-family:'Playfair Display',serif;font-size:1.05rem;font-weight:700;color:var(--c-forest);margin-bottom:.35rem}
.menu-card-desc{font-size:.84rem;color:var(--c-smoke);line-height:1.55}
.menu-card-tags{display:flex;flex-wrap:wrap;gap:.3rem;margin-top:.6rem}
.tag{font-size:.66rem;background:var(--c-cream);color:var(--c-pine);padding:.18rem .6rem;border-radius:100px;font-weight:500}
.menu-card-price{font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:700;color:var(--c-clay);white-space:nowrap}
.menu-card-no-img .menu-card-body{padding:1.5rem 1.6rem}

/* GALERIE */
#galerie{background:var(--c-forest);padding:8rem 5%}
.galerie-header{max-width:1240px;margin:0 auto 3rem;display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:1rem}
.galerie-header .section-label{color:var(--c-mist)}
.galerie-header .section-title{color:var(--c-white)}
.galerie-insta{color:var(--c-fern);font-size:.85rem;font-weight:500;display:flex;align-items:center;gap:6px;transition:color .3s}
.galerie-insta:hover{color:var(--c-white)}
.gallery-grid{max-width:1240px;margin:0 auto;display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:240px 240px;gap:10px}
.g-item{border-radius:14px;overflow:hidden;cursor:pointer;position:relative;background:var(--c-pine)}
.g-item:nth-child(1){grid-column:span 2;grid-row:span 2}
.g-item:nth-child(5){grid-column:span 2}
.g-item img{width:100%;height:100%;object-fit:cover;transition:transform .6s var(--ease)}
.g-item:hover img{transform:scale(1.09)}
.g-item-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(28,52,40,.78) 0%,transparent 55%);opacity:0;transition:opacity .35s;display:flex;align-items:flex-end;padding:1.2rem}
.g-item:hover .g-item-overlay{opacity:1}
.g-item-overlay span{color:rgba(255,255,255,.92);font-size:.78rem;letter-spacing:.08em;text-transform:uppercase;font-weight:500}
#lightbox{display:none;position:fixed;inset:0;z-index:9999;background:rgba(10,20,14,.96);align-items:center;justify-content:center;padding:2rem}
#lightbox.open{display:flex;animation:fadeIn .25s ease}
#lightbox img{max-width:90vw;max-height:88vh;object-fit:contain;border-radius:12px}
#lightbox-close{position:fixed;top:1.5rem;right:1.5rem;background:rgba(255,255,255,.1);border:none;color:var(--c-white);width:44px;height:44px;border-radius:50%;font-size:1.2rem;display:flex;align-items:center;justify-content:center;transition:background .3s}
#lightbox-close:hover{background:rgba(255,255,255,.22)}

/* AVIS */
#avis{background:var(--c-linen);padding:8rem 5%}
.avis-header{text-align:center;margin-bottom:3.5rem}
.avis-score-row{display:flex;align-items:center;justify-content:center;gap:1.4rem;margin-top:1.2rem}
.avis-big-num{font-family:'Playfair Display',serif;font-size:4.5rem;font-weight:700;color:var(--c-forest);line-height:1}
.avis-meta{text-align:left}
.avis-stars{color:var(--c-gold);font-size:1.1rem;letter-spacing:3px}
.avis-count{font-size:.82rem;color:var(--c-smoke);margin-top:4px}
.avis-track-wrap{max-width:1200px;margin:0 auto;overflow:hidden;position:relative}
.avis-track{display:flex;gap:1.5rem;transition:transform .5s var(--ease)}
.avis-card{min-width:calc(33.333% - 1rem);flex-shrink:0;background:var(--c-white);border-radius:20px;padding:2rem 2.2rem;box-shadow:0 4px 24px rgba(28,52,40,.06);transition:box-shadow .3s}
.avis-card:hover{box-shadow:0 10px 40px rgba(28,52,40,.1)}
.avis-card-stars{color:var(--c-gold);font-size:.85rem;letter-spacing:3px;margin-bottom:1rem}
.avis-card-text{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1.08rem;color:var(--c-slate);line-height:1.75;margin-bottom:1.2rem}
.avis-card-author{display:flex;align-items:center;gap:.6rem;font-size:.8rem;font-weight:600;color:var(--c-smoke)}
.avis-card-author::before{content:'';display:block;width:20px;height:1.5px;background:var(--c-fern)}
.avis-dots{display:flex;justify-content:center;gap:8px;margin-top:2.5rem}
.avis-dot{width:8px;height:8px;border-radius:4px;border:none;background:var(--c-mist);cursor:pointer;transition:all .3s}
.avis-dot.active{background:var(--c-pine);width:22px}

/* HORAIRES */
#horaires{background:var(--c-white);padding:8rem 5%}
.horaires-grid{display:grid;grid-template-columns:1fr 1fr;gap:6rem;max-width:1100px;margin:0 auto;align-items:start}
.status-pill{display:inline-flex;align-items:center;gap:8px;padding:.4rem 1rem;border-radius:var(--r-pill);font-size:.78rem;font-weight:600;margin-bottom:1.8rem}
.status-pill.open{background:#e6f4ea;color:#1e6b2e}
.status-pill.closed{background:#fce8e8;color:#b71c1c}
.status-dot{width:8px;height:8px;border-radius:50%}
.status-pill.open .status-dot{background:#34a853;animation:pulse 2s infinite}
.status-pill.closed .status-dot{background:#ea4335}
.hours-table{width:100%}
.hours-row{display:flex;justify-content:space-between;align-items:center;padding:.85rem .8rem;border-radius:10px;transition:background .2s}
.hours-row:hover{background:var(--c-cream)}
.hours-row.today{background:var(--c-cream);font-weight:600}
.hours-day{font-size:.9rem;color:var(--c-slate)}
.hours-row.today .hours-day{color:var(--c-forest)}
.hours-time{font-size:.9rem;color:var(--c-pine);font-weight:500}
.hours-time.closed{color:var(--c-smoke);font-style:italic}
.resa-box h3{font-family:'Playfair Display',serif;font-size:1.7rem;color:var(--c-forest);margin-bottom:.4rem}
.resa-box>p{font-size:.88rem;color:var(--c-smoke);margin-bottom:1.8rem}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.form-field{display:flex;flex-direction:column;gap:5px}
.form-field.full{grid-column:span 2}
label{font-size:.72rem;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--c-smoke)}
input,select,textarea{padding:.8rem 1rem;border:1.5px solid var(--c-warm);border-radius:10px;font-family:'Jost',sans-serif;font-size:.9rem;color:var(--c-ink);background:var(--c-cream);outline:none;appearance:none;transition:border-color .3s,box-shadow .3s,background .3s}
input:focus,select:focus,textarea:focus{border-color:var(--c-sage);box-shadow:0 0 0 3px rgba(78,128,96,.14);background:var(--c-white)}
textarea{resize:vertical;min-height:90px}
.btn-submit{grid-column:span 2;width:100%;background:var(--c-forest);color:var(--c-white);border:none;padding:1rem 2rem;border-radius:12px;font-size:.92rem;font-weight:600;letter-spacing:.04em;margin-top:.5rem;transition:background .3s,transform .25s,box-shadow .3s}
.btn-submit:hover{background:var(--c-pine);transform:translateY(-2px);box-shadow:0 10px 28px rgba(28,52,40,.22)}

/* LOCALISATION */
#localisation{background:var(--c-cream);padding:8rem 5%}
.loc-grid{display:grid;grid-template-columns:380px 1fr;gap:4rem;max-width:1100px;margin:0 auto;align-items:center}
.loc-info{display:flex;flex-direction:column;gap:1.6rem}
.loc-block{display:flex;gap:1rem;align-items:flex-start}
.loc-icon{width:46px;height:46px;background:var(--c-white);border:1px solid var(--c-mist);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0}
.loc-block-text strong{display:block;font-size:.72rem;text-transform:uppercase;letter-spacing:.1em;color:var(--c-smoke);font-weight:600;margin-bottom:3px}
.loc-block-text span,.loc-block-text a{font-size:.92rem;color:var(--c-ink)}
.loc-block-text a{color:var(--c-pine);transition:color .3s}
.loc-block-text a:hover{color:var(--c-clay)}
.loc-btn{display:inline-flex;align-items:center;gap:8px;background:var(--c-clay);color:var(--c-white);padding:.75rem 1.5rem;border-radius:var(--r-pill);font-size:.85rem;font-weight:600;margin-top:.5rem;transition:background .3s,transform .25s}
.loc-btn:hover{background:var(--c-blush);transform:translateY(-2px)}
.map-wrap{border-radius:22px;overflow:hidden;aspect-ratio:4/3;box-shadow:0 20px 60px rgba(28,52,40,.12)}
.map-wrap iframe{width:100%;height:100%;border:none}

/* FOOTER */
footer{background:var(--c-forest);color:rgba(255,255,255,.7);padding:4rem 5% 2.5rem}
.footer-grid{display:grid;grid-template-columns:1fr auto 1fr;gap:3rem;max-width:1100px;margin:0 auto;align-items:start}
.logo-mark-f{width:52px;height:52px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-style:italic;font-size:10px;color:var(--c-cream);margin-bottom:1rem;padding:6px;text-align:center;line-height:1.2}
.footer-brand h4{font-family:'Playfair Display',serif;font-size:1.15rem;font-weight:700;color:var(--c-white)}
.footer-brand p{font-size:.82rem;margin-top:.4rem}
.footer-social{display:flex;gap:.8rem;margin-top:1.2rem}
.footer-social a{width:36px;height:36px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:.85rem;color:rgba(255,255,255,.7);transition:all .3s}
.footer-social a:hover{background:var(--c-clay);color:var(--c-white);border-color:var(--c-clay)}
.footer-nav-col h5,.footer-center h5{font-size:.72rem;text-transform:uppercase;letter-spacing:.18em;font-weight:600;color:var(--c-fern);margin-bottom:1rem}
.footer-nav-col ul{list-style:none;display:flex;flex-direction:column;gap:.55rem}
.footer-nav-col li a{font-size:.86rem;color:rgba(255,255,255,.65);transition:color .3s}
.footer-nav-col li a:hover{color:var(--c-white)}
.footer-center{text-align:center}
.footer-center address{font-style:normal;font-size:.86rem;line-height:1.7}
.ft-tel{display:block;margin-top:.6rem;font-size:1rem;font-weight:600;color:var(--c-white)}
.footer-bottom{max-width:1100px;margin:3rem auto 0;padding-top:1.5rem;border-top:1px solid rgba(255,255,255,.1);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.8rem;font-size:.75rem}
.footer-bottom a{color:rgba(255,255,255,.5);transition:color .3s}
.footer-bottom a:hover{color:var(--c-white)}

/* SAISON SWITCHER */
.saison-switcher{display:flex;justify-content:center;gap:.6rem;flex-wrap:wrap;margin:0 auto 3rem;max-width:1240px;padding:0 5%}
.saison-btn{background:none;border:1.5px solid var(--c-mist);color:var(--c-slate);padding:.65rem 1.8rem;border-radius:var(--r-pill);font-size:.88rem;font-weight:600;letter-spacing:.04em;transition:all .3s;cursor:pointer}
.saison-btn:hover{border-color:var(--c-sage);color:var(--c-pine);background:#eaf3ec}
.saison-btn.active{background:var(--c-forest);border-color:var(--c-forest);color:var(--c-white);box-shadow:0 6px 20px rgba(28,52,40,.2)}

/* SAISON PANELS */
.saison-panel{display:none;max-width:1240px;margin:0 auto;padding:0 5%}
.saison-panel.active{display:block}

/* SAISON HEADER */
.saison-header{text-align:center;margin-bottom:2.5rem}
.saison-badge{display:inline-block;padding:.6rem 1.8rem;border-radius:var(--r-pill);font-size:.85rem;font-weight:600;letter-spacing:.06em}
.saison-badge.ete{background:linear-gradient(135deg,#f97316,#f59e0b);color:var(--c-white)}
.saison-badge.printemps{background:linear-gradient(135deg,#10b981,#34d399);color:var(--c-white)}

/* FORMULES GRID */
.formules-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.5rem;margin-top:2.5rem}
.formule-card{background:var(--c-white);border-radius:20px;overflow:hidden;box-shadow:0 4px 20px rgba(28,52,40,.07);transition:transform .3s,box-shadow .3s;display:flex;flex-direction:column}
.formule-card:hover{transform:translateY(-5px);box-shadow:0 16px 45px rgba(28,52,40,.12)}
.formule-header{display:flex;align-items:center;gap:1rem;padding:1.4rem 1.6rem;border-bottom:1px solid var(--c-warm)}
.formule-header.buffet{background:linear-gradient(135deg,#e8f5e9,#f1f8f2)}
.formule-header.cocktail{background:linear-gradient(135deg,#fff3e0,#fef9f0)}
.formule-header.plateau{background:linear-gradient(135deg,#fce4ec,#fdf0f4)}
.formule-icon{font-size:2rem;line-height:1}
.formule-name{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700;color:var(--c-forest)}
.formule-price{font-size:1.3rem;font-weight:700;color:var(--c-clay);font-family:'Playfair Display',serif;margin-top:2px}

.formule-items{list-style:none;padding:1rem 1.6rem;flex:1;display:flex;flex-direction:column;gap:.55rem}
.formule-items li{font-size:.87rem;color:var(--c-slate);line-height:1.5;padding-left:1rem;position:relative}
.formule-items li::before{content:'·';position:absolute;left:0;color:var(--c-sage);font-weight:700}
.formule-items li strong{color:var(--c-forest)}
.formule-extras{display:flex;flex-wrap:wrap;gap:.4rem;padding:1rem 1.6rem 1.4rem;border-top:1px solid var(--c-cream)}
.formule-extras span{font-size:.75rem;background:var(--c-cream);color:var(--c-pine);padding:.25rem .7rem;border-radius:100px;font-weight:500}

/* MODALITÉS */
.modalites-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.2rem;max-width:1240px;margin:0 auto;padding:0 5%}
.modalite-card{background:var(--c-white);border-radius:16px;padding:1.6rem;display:flex;gap:1rem;align-items:flex-start;box-shadow:0 3px 15px rgba(28,52,40,.06);transition:transform .3s,box-shadow .3s}
.modalite-card:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(28,52,40,.1)}
.modalite-card.alert{background:linear-gradient(135deg,#e8f5e9,#f1f8f2);border:1px solid var(--c-mist)}
.modalite-icon{font-size:1.8rem;line-height:1;flex-shrink:0}
.modalite-text{display:flex;flex-direction:column;gap:4px}
.modalite-text strong{font-size:.88rem;font-weight:700;color:var(--c-forest);text-transform:uppercase;letter-spacing:.06em}
.modalite-text span{font-size:.85rem;color:var(--c-slate);line-height:1.55}
.modalite-text a{color:var(--c-pine);font-weight:600;transition:color .3s}
.modalite-text a:hover{color:var(--c-clay)}
.modalites-cta{text-align:center;margin-top:3rem;padding:2.5rem;background:var(--c-forest);border-radius:20px;max-width:1240px;margin:2.5rem auto 0;padding:2.5rem 5%}
.modalites-cta p{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1.3rem;color:rgba(255,255,255,.85);margin-bottom:1.5rem}

/* RESPONSIVE */
@media(max-width:860px){
  .formules-grid{grid-template-columns:1fr}
  .modalites-grid{grid-template-columns:1fr 1fr}

  .nav-links{display:none}
  .hamburger{display:flex}
  .pres-grid{grid-template-columns:1fr;gap:3rem}
  .pres-img-wrap{order:-1}
  .pres-stat{left:auto;right:1rem;bottom:1rem}
  .brunch-card{grid-template-columns:1fr;gap:1.5rem}
  .brunch-divider{display:none}
  .avis-card{min-width:calc(80% - .75rem)}
  .horaires-grid{grid-template-columns:1fr;gap:4rem}
  .loc-grid{grid-template-columns:1fr}
  .gallery-grid{grid-template-columns:repeat(2,1fr);grid-template-rows:repeat(3,200px)}
  .g-item:nth-child(1){grid-column:span 2;grid-row:span 1}
  .g-item:nth-child(5){grid-column:span 2}
  .footer-grid{grid-template-columns:1fr;gap:2.5rem}
  .footer-center{text-align:left}
}
@media(max-width:560px){
  .formules-grid,.modalites-grid{grid-template-columns:1fr}
  .saison-btn{padding:.55rem 1rem;font-size:.8rem}

  #presentation,#menu,#galerie,#avis,#horaires,#localisation{padding:5rem 5%}
  .form-grid{grid-template-columns:1fr}
  .form-field.full,.btn-submit{grid-column:span 1}
  .hero-badge{display:none}
  .avis-card{min-width:calc(92% - .75rem)}
}
